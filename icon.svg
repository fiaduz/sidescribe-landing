<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#bfdbfe" />
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- App Icon Base Background -->
  <rect width="128" height="128" rx="32" fill="url(#bgGrad)" />
  
  <!-- The Vibrant Blue Sidebar -->
  <rect x="24" y="24" width="36" height="80" rx="8" fill="url(#sidebarGrad)" filter="url(#shadow)" />
  
  <!-- The White Editor Page -->
  <rect x="52" y="36" width="52" height="56" rx="6" fill="#ffffff" filter="url(#shadow)" />
  
  <!-- Minimalist Text Lines on the Page -->
  <line x1="64" y1="48" x2="92" y2="48" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
  <line x1="64" y1="60" x2="84" y2="60" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
  <line x1="64" y1="72" x2="92" y2="72" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
  
  <!-- Floating Pen Icon Overlapping the Sidebar -->
  <g transform="translate(68, 56) scale(1.2)">
    <path d="M19.4 4.6a2.8 2.8 0 0 0-4 0l-12 12A2.8 2.8 0 0 0 3 18.6V23h4.4a2.8 2.8 0 0 0 2-1l12-12a2.8 2.8 0 0 0 0-4Z" fill="#1e3a8a" />
    <path d="M15.4 4.6l4 4" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <path d="M3 23l4.4-4.4" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
